version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexus-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  nexus:
    build: .
    container_name: nexus-agent
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # gmail_token.json lives here
    env_file:
      - .env
    depends_on:
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
